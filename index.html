<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人計畫系統</title>
<script>
  // 依月份自動決定主題：單數月＝健身工廠風，雙數月＝陽光沙灘風
  // 也可以用網址加 ?theme=gym 或 ?theme=beach 強制預覽指定主題
  (function () {
    var forced = new URLSearchParams(location.search).get('theme');
    var month = new Date().getMonth() + 1;
    var theme = forced === 'gym' || forced === 'beach' ? forced : (month % 2 === 1 ? 'gym' : 'beach');
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&family=Oswald:wght@500;600;700&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  /* 保底預設值：萬一瀏覽器停用 JS，抓不到月份主題時的備用配色 */
  :root {
    --bg: #F6F7FC;
    --surface: #FFFFFF;
    --surface-alt: #F0F1F8;
    --text-primary: #1F2430;
    --text-secondary: #6B7280;
    --border: #E5E7EE;
    --brand: #6366F1;
    --brand-dark: #4F46E5;
    --brand-light: #EEF0FF;
    --brand-shadow: rgba(99, 102, 241, 0.3);
    --brand-text-on: #FFFFFF;
    --cat-a: #3B82F6; --cat-a-bg: #EAF2FF;
    --cat-b: #8B5CF6; --cat-b-bg: #F4F0FF;
    --cat-c: #F59E0B; --cat-c-bg: #FFF6E6;
    --cat-d: #10B981; --cat-d-bg: #E9FBF4;
    --danger: #EF4444; --danger-bg: #FEF0F0;
    --success: #22C55E; --success-bg: #EFFBF3;
    --radius-sm: 10px; --radius-md: 16px; --radius-lg: 22px;
    --shadow-card: 0 2px 10px rgba(31, 36, 48, 0.06);
    --shadow-pop: 0 12px 32px rgba(31, 36, 48, 0.16);
    --topbar-bg: rgba(246, 247, 252, 0.85);
    --banner-gradient: linear-gradient(120deg, #6366F1 0%, #8B5CF6 100%);
    --font-display: 'Baloo 2', 'Noto Sans TC', sans-serif;
    --btn-label-transform: none;
    --btn-label-tracking: normal;
  }

  /* =========================================================
     主題一：健身工廠風（單數月）— 深色工業感、螢光重點色
     ========================================================= */
  :root[data-theme="gym"] {
    --bg: #131417;
    --surface: #1C1F24;
    --surface-alt: #24282F;
    --text-primary: #F2F3F0;
    --text-secondary: #9AA1AA;
    --border: #2E333B;

    --brand: #C6FF3D;
    --brand-dark: #A8E62E;
    --brand-light: rgba(198, 255, 61, 0.14);
    --brand-shadow: rgba(198, 255, 61, 0.28);
    --brand-text-on: #12140F;

    --cat-a: #4DA6FF;
    --cat-a-bg: rgba(77, 166, 255, 0.14);
    --cat-b: #C084FC;
    --cat-b-bg: rgba(192, 132, 252, 0.14);
    --cat-c: #FF8A3D;
    --cat-c-bg: rgba(255, 138, 61, 0.14);
    --cat-d: #3DDC97;
    --cat-d-bg: rgba(61, 220, 151, 0.14);

    --danger: #FF453A;
    --danger-bg: rgba(255, 69, 58, 0.14);
    --success: #3DDC97;
    --success-bg: rgba(61, 220, 151, 0.14);

    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --shadow-card: 0 1px 0 rgba(255,255,255,0.03) inset, 0 8px 18px rgba(0,0,0,0.45);
    --shadow-pop: 0 16px 40px rgba(0,0,0,0.6);

    --topbar-bg: rgba(19, 20, 23, 0.85);
    --banner-gradient: linear-gradient(120deg, #22262C 0%, #14161A 100%);
    --font-display: 'Oswald', 'Noto Sans TC', sans-serif;
    --btn-label-transform: uppercase;
    --btn-label-tracking: 0.04em;
  }

  /* =========================================================
     主題二：陽光沙灘風（雙數月）— 明亮暖色、海洋漸層
     ========================================================= */
  :root[data-theme="beach"] {
    --bg: linear-gradient(180deg, #EAF6FF 0%, #FDF8ED 55%);
    --surface: #FFFFFF;
    --surface-alt: #F0F8FB;
    --text-primary: #1F3B4D;
    --text-secondary: #6B8B9B;
    --border: #E1EEF2;

    --brand: #0EA5E9;
    --brand-dark: #0284C7;
    --brand-light: #E0F5FF;
    --brand-shadow: rgba(14, 165, 233, 0.28);
    --brand-text-on: #FFFFFF;

    --cat-a: #2D9CDB;
    --cat-a-bg: #E5F5FC;
    --cat-b: #2DD4BF;
    --cat-b-bg: #E1FBF7;
    --cat-c: #FF8A63;
    --cat-c-bg: #FFF0E8;
    --cat-d: #6FCF97;
    --cat-d-bg: #EAFAF0;

    --danger: #FF6B6B;
    --danger-bg: #FFEFEF;
    --success: #34C77B;
    --success-bg: #E9FAF1;

    --radius-sm: 12px;
    --radius-md: 18px;
    --radius-lg: 26px;
    --shadow-card: 0 4px 14px rgba(14, 100, 150, 0.08);
    --shadow-pop: 0 16px 36px rgba(14, 100, 150, 0.18);

    --topbar-bg: rgba(255, 255, 255, 0.75);
    --banner-gradient: linear-gradient(120deg, #0EA5E9 0%, #2DD4BF 100%);
    --font-display: 'Fredoka', 'Noto Sans TC', sans-serif;
    --btn-label-transform: none;
    --btn-label-tracking: normal;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Noto Sans TC', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .num, .display {
    font-family: var(--font-display), 'Noto Sans TC', sans-serif;
  }

  a { color: inherit; }

  /* ===================== 頂部導覽列 ===================== */

  .topbar {
    position: sticky;
    top: 0;
    z-index: 40;
    background: var(--topbar-bg);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }

  .topbar-inner {
    max-width: 1120px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .brand-title {
    font-family: var(--font-display), sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--brand-dark);
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .brand-title .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--cat-a), var(--cat-b), var(--cat-c), var(--cat-d));
    flex-shrink: 0;
  }

  .theme-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: 11.5px;
    color: var(--text-secondary);
    background: var(--surface-alt);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 999px;
    margin-left: 4px;
    white-space: nowrap;
  }

  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface-alt);
    padding: 4px;
    border-radius: 999px;
  }

  .tab-btn {
    border: none;
    background: transparent;
    padding: 8px 20px;
    border-radius: 999px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all .18s ease;
    text-transform: var(--btn-label-transform);
    letter-spacing: var(--btn-label-tracking);
  }
  .tab-btn:hover { color: var(--text-primary); }
  .tab-btn.active {
    background: var(--surface);
    color: var(--brand-dark);
    box-shadow: var(--shadow-card);
  }

  .lock-area {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--surface-alt);
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
    white-space: nowrap;
    transition: all .18s ease;
  }
  .lock-area:hover { background: var(--border); }
  .lock-area.unlocked {
    background: var(--success-bg);
    color: var(--success);
  }

  /* ===================== 版面容器 ===================== */

  .page {
    max-width: 1120px;
    margin: 0 auto;
    padding: 28px 24px 80px;
    display: none;
    animation: fadeIn .25s ease;
  }
  .page.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .page-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .page-title {
    font-size: 22px;
    font-weight: 900;
  }

  .page-sub {
    color: var(--text-secondary);
    font-size: 14px;
    margin-top: 2px;
  }

  .btn {
    border: none;
    border-radius: 12px;
    padding: 10px 18px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: transform .12s ease, box-shadow .12s ease;
    text-transform: var(--btn-label-transform);
    letter-spacing: var(--btn-label-tracking);
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--brand);
    color: var(--brand-text-on);
    box-shadow: 0 6px 16px var(--brand-shadow);
  }
  .btn-primary:hover { filter: brightness(0.94); }

  .btn-ghost {
    background: var(--surface);
    color: var(--text-primary);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface-alt); }

  /* ===================== 總覽橫幅 ===================== */

  .summary-banner {
    background: var(--banner-gradient);
    color: white;
    border-radius: var(--radius-lg);
    padding: 20px 26px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .summary-banner .label {
    font-size: 13px;
    opacity: .85;
    font-weight: 500;
  }
  .summary-banner .value {
    font-family: var(--font-display), sans-serif;
    font-size: 34px;
    font-weight: 700;
    line-height: 1;
  }

  /* ===================== 篩選籤 ===================== */

  .filter-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  .filter-tab {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
    cursor: pointer;
  }
  .filter-tab.active {
    background: var(--text-primary);
    color: white;
    border-color: var(--text-primary);
  }

  /* ===================== 目標卡片 ===================== */

  .goal-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 16px;
  }

  .goal-card {
    background: var(--surface);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-card);
    padding: 18px;
    position: relative;
    overflow: hidden;
    border: 1px solid transparent;
    transition: box-shadow .18s ease, transform .18s ease;
  }
  .goal-card:hover { box-shadow: var(--shadow-pop); transform: translateY(-2px); }

  .goal-card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
  }
  .goal-card.cat-A::before { background: var(--cat-a); }
  .goal-card.cat-B::before { background: var(--cat-b); }
  .goal-card.cat-C::before { background: var(--cat-c); }
  .goal-card.cat-D::before { background: var(--cat-d); }

  .goal-card.overdue {
    border-color: var(--danger);
    background: var(--danger-bg);
  }
  .goal-card.overdue::before { background: var(--danger); }

  .goal-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }

  .goal-id-badge {
    display: inline-block;
    font-family: var(--font-display), sans-serif;
    font-weight: 700;
    font-size: 12px;
    padding: 2px 9px;
    border-radius: 999px;
  }
  .cat-A .goal-id-badge { background: var(--cat-a-bg); color: var(--cat-a); }
  .cat-B .goal-id-badge { background: var(--cat-b-bg); color: var(--cat-b); }
  .cat-C .goal-id-badge { background: var(--cat-c-bg); color: var(--cat-c); }
  .cat-D .goal-id-badge { background: var(--cat-d-bg); color: var(--cat-d); }

  .goal-name {
    font-weight: 700;
    font-size: 15px;
    margin: 8px 0 10px;
    line-height: 1.4;
  }

  .overdue-flag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--danger);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    margin-bottom: 8px;
  }

  .progress-track {
    background: var(--surface-alt);
    border-radius: 999px;
    height: 9px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 999px;
    width: 0%;
    transition: width 1s cubic-bezier(.22,1,.36,1);
  }
  .cat-A .progress-fill { background: var(--cat-a); }
  .cat-B .progress-fill { background: var(--cat-b); }
  .cat-C .progress-fill { background: var(--cat-c); }
  .cat-D .progress-fill { background: var(--cat-d); }
  .overdue .progress-fill { background: var(--danger); }

  .progress-text {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
  }
  .progress-text .pct {
    font-family: var(--font-display), sans-serif;
    font-weight: 700;
    color: var(--text-primary);
  }

  .goal-meta {
    font-size: 12.5px;
    color: var(--text-secondary);
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 12px;
  }
  .goal-meta .row { display: flex; justify-content: space-between; align-items: center; }
  .goal-meta .editable {
    cursor: pointer;
    border-bottom: 1px dashed var(--border);
    font-weight: 700;
    color: var(--text-primary);
  }
  .goal-meta .editable:hover { border-color: var(--brand); color: var(--brand-dark); }
  .goal-meta input {
    width: 90px;
    border: 1px solid var(--brand);
    border-radius: 6px;
    padding: 2px 6px;
    font-family: inherit;
    font-size: 12.5px;
  }

  .goal-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: 10px;
  }

  select.status-select {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 8px;
    font-size: 12.5px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text-primary);
  }

  /* ===================== 週計畫表格 ===================== */

  .week-table-wrap {
    background: var(--surface);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  table.week-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }
  .week-table th, .week-table td {
    padding: 12px 14px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .week-table th {
    background: var(--surface-alt);
    font-weight: 700;
    color: var(--text-secondary);
    font-size: 12.5px;
  }
  .week-table td.goal-label {
    text-align: left;
    font-weight: 700;
    position: relative;
    padding-left: 18px;
  }
  .week-table td.goal-label::before {
    content: "";
    position: absolute;
    left: 0; top: 8px; bottom: 8px;
    width: 4px;
    border-radius: 4px;
  }
  .week-row.cat-A td.goal-label::before { background: var(--cat-a); }
  .week-row.cat-B td.goal-label::before { background: var(--cat-b); }
  .week-row.cat-C td.goal-label::before { background: var(--cat-c); }
  .week-row.cat-D td.goal-label::before { background: var(--cat-d); }

  .week-table td.num-cell {
    font-family: var(--font-display), sans-serif;
    font-weight: 600;
  }
  .week-table tr.total-row td {
    font-weight: 800;
    background: var(--brand-light);
    color: var(--brand-dark);
    font-family: var(--font-display), sans-serif;
  }
  .week-table td.weekend-note {
    color: var(--text-secondary);
    font-size: 12px;
  }

  /* ===================== 日計畫 ===================== */

  .day-date-hero {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 18px 24px;
    box-shadow: var(--shadow-card);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .day-date-hero .date-str {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-secondary);
  }
  .day-date-hero .total-str {
    font-family: var(--font-display), sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--brand-dark);
  }

  .day-list { display: flex; flex-direction: column; gap: 14px; }

  .day-card {
    background: var(--surface);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-card);
    padding: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    border-left: 5px solid var(--border);
    transition: box-shadow .2s ease;
  }
  .day-card.cat-A { border-left-color: var(--cat-a); }
  .day-card.cat-B { border-left-color: var(--cat-b); }
  .day-card.cat-C { border-left-color: var(--cat-c); }
  .day-card.cat-D { border-left-color: var(--cat-d); }
  .day-card.done { background: var(--success-bg); }
  .day-card.just-logged { animation: pop .4s ease; }

  @keyframes pop {
    0% { transform: scale(1); }
    30% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }

  .day-card-main { flex: 1; min-width: 220px; }
  .day-goal-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .day-goal-sub { font-size: 12.5px; color: var(--text-secondary); }
  .day-goal-sub .num { font-weight: 700; color: var(--text-primary); }

  .day-card-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .check-btn {
    border: none;
    background: var(--success);
    color: white;
    padding: 9px 16px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .check-btn:hover { filter: brightness(0.95); }

  .manual-input-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .manual-input-group input {
    width: 64px;
    padding: 8px 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
  }
  .manual-input-group button {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 8px 12px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
  }
  .manual-input-group button:hover { background: var(--surface-alt); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }
  .empty-state .big { font-size: 40px; margin-bottom: 10px; }

  /* ===================== Modal ===================== */

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(31, 36, 48, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 26px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-pop);
    animation: modalIn .22s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(10px) scale(.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal h3 {
    margin: 0 0 4px;
    font-size: 18px;
    font-weight: 900;
  }
  .modal .modal-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 18px;
  }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--text-secondary);
    margin-bottom: 5px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    background: var(--surface);
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--brand);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }
  .modal-actions .btn { flex: 1; }

  .error-text {
    color: var(--danger);
    font-size: 12.5px;
    margin-top: 8px;
    display: none;
  }

  /* ===================== Toast ===================== */

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text-primary);
    color: white;
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 13.5px;
    font-weight: 700;
    box-shadow: var(--shadow-pop);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: all .25s ease;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.error { background: var(--danger); }
  .toast.success { background: var(--success); color: #0A2416; }

  .loading-spin {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 720px) {
    .topbar-inner { flex-wrap: wrap; }
    .tabs { order: 3; width: 100%; justify-content: center; }
    .week-table { font-size: 12px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand-title"><span class="dot"></span>個人計畫系統<span id="themeBadge" class="theme-badge"></span></div>
    <div class="tabs">
      <button class="tab-btn active" data-page="year">年計畫</button>
      <button class="tab-btn" data-page="week">週計畫</button>
      <button class="tab-btn" data-page="day">日計畫</button>
    </div>
    <div class="lock-area" id="lockArea">
      <span id="lockIcon">🔒</span>
      <span id="lockLabel">檢視模式</span>
    </div>
  </div>
</div>

<!-- ===================== 年計畫 ===================== -->
<div class="page active" id="page-year">
  <div class="summary-banner">
    <div>
      <div class="label">今天所有進行中目標，建議投入時數加總</div>
      <div class="value num" id="yearTodayTotal">0 h</div>
    </div>
    <button class="btn btn-primary" id="btnOpenAddGoal">+ 新增目標</button>
  </div>

  <div class="page-header">
    <div class="filter-tabs" id="yearFilterTabs">
      <button class="filter-tab active" data-status="active">進行中</button>
      <button class="filter-tab" data-status="done">已完成</button>
      <button class="filter-tab" data-status="abandoned">已放棄</button>
    </div>
  </div>

  <div id="yearGoalGrid" class="goal-grid"></div>
</div>

<!-- ===================== 週計畫 ===================== -->
<div class="page" id="page-week">
  <div class="page-header">
    <div>
      <div class="page-title">本週計畫</div>
      <div class="page-sub" id="weekRangeLabel">—</div>
    </div>
  </div>
  <div class="week-table-wrap">
    <table class="week-table" id="weekTable"></table>
  </div>
</div>

<!-- ===================== 日計畫 ===================== -->
<div class="page" id="page-day">
  <div class="day-date-hero">
    <div>
      <div class="date-str" id="dayDateStr">—</div>
    </div>
    <div class="total-str" id="dayTotalStr">今日建議投入 0 h</div>
  </div>
  <div class="day-list" id="dayList"></div>
</div>

<!-- ===================== 密碼 Modal ===================== -->
<div class="modal-overlay" id="passwordModalOverlay">
  <div class="modal">
    <h3>輸入密碼</h3>
    <div class="modal-sub">解鎖後才能新增、編輯目標或記錄時數。重新整理頁面會恢復鎖定。</div>
    <div class="field">
      <label>密碼</label>
      <input type="password" id="passwordInput" placeholder="輸入密碼">
    </div>
    <div class="error-text" id="passwordError">密碼不正確，請再試一次</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnCancelPassword">取消</button>
      <button class="btn btn-primary" id="btnSubmitPassword">解鎖</button>
    </div>
  </div>
</div>

<!-- ===================== 新增目標 Modal ===================== -->
<div class="modal-overlay" id="addGoalModalOverlay">
  <div class="modal">
    <h3>新增年度目標</h3>
    <div class="modal-sub">目標編號會依分類自動產生</div>
    <div class="field">
      <label>分類</label>
      <select id="newGoalCategory"></select>
    </div>
    <div class="field">
      <label>目標名稱</label>
      <input type="text" id="newGoalName" placeholder="例如：部門年度計畫優化">
    </div>
    <div class="field">
      <label>預估總時數（小時）</label>
      <input type="number" id="newGoalHours" min="0" step="0.5" placeholder="例如：150">
    </div>
    <div class="field">
      <label>開始日</label>
      <input type="date" id="newGoalStart">
    </div>
    <div class="field">
      <label>截止日</label>
      <input type="date" id="newGoalDeadline">
    </div>
    <div class="field">
      <label>備註（選填）</label>
      <textarea id="newGoalNote" rows="2"></textarea>
    </div>
    <div class="error-text" id="addGoalError">請確認欄位都已填寫</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnCancelAddGoal">取消</button>
      <button class="btn btn-primary" id="btnSubmitAddGoal">新增</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   設定：把這裡換成你自己的 Apps Script 部署網址
   ========================================================= */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwY1-db1nfbdvjiW7YJP6ZG-HQJ7FmhznBbBPJe4Y84UKvwrUoO80TnajS1dOvbYbd-/exec";

/* =========================================================
   主題（單數月＝健身工廠風／雙數月＝陽光沙灘風）
   data-theme 屬性已經在 <head> 的 inline script 裡依月份設定好了，
   這裡只是讀出來，決定要顯示的圖示和文字
   ========================================================= */
const THEME_NAME = document.documentElement.getAttribute('data-theme') || 'beach';
const THEME_CONFIG = {
  gym:   { badgeIcon: '🔥', badgeLabel: '健身模式', emptyIcon: '🏋️', celebrateIcon: '🏆', checkIcon: '💪', overdueIcon: '🚨' },
  beach: { badgeIcon: '🌊', badgeLabel: '海洋模式', emptyIcon: '🌴', celebrateIcon: '🎉', checkIcon: '☀️', overdueIcon: '⚠️' }
};
const THEME = THEME_CONFIG[THEME_NAME] || THEME_CONFIG.beach;

document.addEventListener('DOMContentLoaded', () => {
  const badge = document.getElementById('themeBadge');
  if (badge) badge.textContent = THEME.badgeIcon + ' ' + THEME.badgeLabel;
});

/* =========================================================
   全域狀態
   ========================================================= */
const state = {
  password: null,          // 解鎖後暫存在記憶體，重新整理就消失
  categories: [],
  activeGoals: [],
  historyGoals: [],
  currentYearFilter: 'active',
  todayLogs: {}            // 今天的 DailyLog，依 goalID 累計
};

const CAT_COLOR_CLASS = { 'A': 'cat-A', 'B': 'cat-B', 'C': 'cat-C', 'D': 'cat-D' };

function categoryGroup(categoryCode) {
  // "A-4" -> "A"
  return (categoryCode || '').split('-')[0];
}

function fmtHours(n) {
  const v = Math.round((Number(n) || 0) * 100) / 100;
  return (v % 1 === 0 ? v.toFixed(0) : v.toFixed(2).replace(/0$/, '')) ;
}

function todayISO() {
  const d = new Date();
  const tz = d.getTimezoneOffset() * 60000;
  return new Date(d - tz).toISOString().slice(0, 10);
}

/* =========================================================
   API 呼叫
   ========================================================= */
async function apiGet(action, params) {
  const url = new URL(APPS_SCRIPT_URL);
  url.searchParams.set('action', action);
  Object.entries(params || {}).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  const json = await res.json();
  if (!json.success) throw new Error(json.error || '讀取失敗');
  return json.data;
}

async function apiPost(action, payload) {
  const body = Object.assign({ action, password: state.password }, payload || {});
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // 避免觸發 CORS preflight
    body: JSON.stringify(body)
  });
  const json = await res.json();
  if (!json.success) throw new Error(json.error || '操作失敗');
  return json.data;
}

/* =========================================================
   Toast 提示
   ========================================================= */
let toastTimer = null;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2600);
}

/* =========================================================
   密碼鎖
   ========================================================= */
const lockArea = document.getElementById('lockArea');
const passwordModalOverlay = document.getElementById('passwordModalOverlay');
const passwordInput = document.getElementById('passwordInput');
const passwordError = document.getElementById('passwordError');

function isUnlocked() { return !!state.password; }

function requireUnlock(onUnlocked) {
  if (isUnlocked()) { onUnlocked(); return; }
  pendingAfterUnlock = onUnlocked;
  openPasswordModal();
}
let pendingAfterUnlock = null;

function openPasswordModal() {
  passwordError.style.display = 'none';
  passwordInput.value = '';
  passwordModalOverlay.classList.add('show');
  setTimeout(() => passwordInput.focus(), 50);
}
function closePasswordModal() {
  passwordModalOverlay.classList.remove('show');
  pendingAfterUnlock = null;
}

lockArea.addEventListener('click', () => {
  if (isUnlocked()) {
    // 點一下切回鎖定
    state.password = null;
    updateLockUI();
    showToast('已重新鎖定');
  } else {
    openPasswordModal();
  }
});

document.getElementById('btnCancelPassword').addEventListener('click', closePasswordModal);

document.getElementById('btnSubmitPassword').addEventListener('click', async () => {
  const pw = passwordInput.value;
  if (!pw) return;
  const btn = document.getElementById('btnSubmitPassword');
  btn.disabled = true;
  try {
    const url = new URL(APPS_SCRIPT_URL);
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'verifyPassword', password: pw })
    });
    const json = await res.json();
    if (json.success && json.data.success) {
      state.password = pw;
      updateLockUI();
      closePasswordModal();
      showToast('解鎖成功，可以編輯了', 'success');
      if (pendingAfterUnlock) { const fn = pendingAfterUnlock; pendingAfterUnlock = null; fn(); }
    } else {
      passwordError.style.display = 'block';
    }
  } catch (e) {
    passwordError.textContent = '連線失敗，請稍後再試';
    passwordError.style.display = 'block';
  } finally {
    btn.disabled = false;
  }
});

passwordInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('btnSubmitPassword').click();
});

function updateLockUI() {
  if (isUnlocked()) {
    lockArea.classList.add('unlocked');
    document.getElementById('lockIcon').textContent = '🔓';
    document.getElementById('lockLabel').textContent = '編輯模式中';
  } else {
    lockArea.classList.remove('unlocked');
    document.getElementById('lockIcon').textContent = '🔒';
    document.getElementById('lockLabel').textContent = '檢視模式';
  }
}

/* =========================================================
   分頁切換
   ========================================================= */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const page = btn.dataset.page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    if (page === 'week') renderWeekPage();
    if (page === 'day') renderDayPage();
  });
});

/* =========================================================
   年計畫頁
   ========================================================= */
document.querySelectorAll('#yearFilterTabs .filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#yearFilterTabs .filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.currentYearFilter = btn.dataset.status;
    renderYearGoals();
  });
});

function renderYearGoals() {
  const grid = document.getElementById('yearGoalGrid');
  let list;
  if (state.currentYearFilter === 'active') list = state.activeGoals;
  else if (state.currentYearFilter === 'done') list = state.historyGoals.filter(g => g.status === '已完成');
  else list = state.historyGoals.filter(g => g.status === '已放棄');

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="big">${THEME.emptyIcon}</div>
      ${state.currentYearFilter === 'active' ? '還沒有進行中的目標，點右上角新增一個吧' : '這裡還沒有紀錄'}
    </div>`;
    return;
  }

  grid.innerHTML = list.map(g => renderGoalCard(g, state.currentYearFilter === 'active')).join('');

  // 進度條動畫：先設 0 再設實際寬度，觸發 transition
  requestAnimationFrame(() => {
    list.forEach(g => {
      const el = document.getElementById('bar-' + g.goalID);
      if (el) {
        const pct = g.estimatedHours > 0 ? Math.min(100, (g.accumulatedHours / g.estimatedHours) * 100) : 0;
        setTimeout(() => { el.style.width = pct + '%'; }, 30);
      }
    });
  });

  if (state.currentYearFilter === 'active') bindActiveCardEvents();
}

function renderGoalCard(g, isActive) {
  const catGroup = categoryGroup(g.categoryCode);
  const catClass = CAT_COLOR_CLASS[catGroup] || 'cat-A';
  const pct = g.estimatedHours > 0 ? Math.min(100, Math.round((g.accumulatedHours / g.estimatedHours) * 100)) : 0;
  const overdueClass = (isActive && g.isOverdue) ? ' overdue' : '';

  const metaBody = isActive ? `
    <div class="goal-meta">
      <div class="row"><span>預估總時數</span>
        <span class="editable" data-field="EstimatedHours" data-goal="${g.goalID}" data-current="${g.estimatedHours}">${fmtHours(g.estimatedHours)} h</span>
      </div>
      <div class="row"><span>截止日</span>
        <span class="editable" data-field="Deadline" data-goal="${g.goalID}" data-current="${g.deadline}">${g.deadline}</span>
      </div>
      <div class="row"><span>今日建議</span><span class="num" style="font-weight:700">${g.isOverdue ? '—' : fmtHours(g.suggestedDailyHours) + ' h/天'}</span></div>
      <div class="row"><span>剩餘平日</span><span>${g.remainingWeekdays} 天</span></div>
    </div>
    <div class="goal-footer">
      <select class="status-select" data-goal="${g.goalID}">
        <option value="進行中" selected>進行中</option>
        <option value="已完成">已完成</option>
        <option value="已放棄">已放棄</option>
      </select>
    </div>
  ` : `
    <div class="goal-meta">
      <div class="row"><span>總投入</span><span class="num" style="font-weight:700">${fmtHours(g.accumulatedHours)} / ${fmtHours(g.estimatedHours)} h</span></div>
      <div class="row"><span>期間</span><span>${g.startDate} ~ ${g.deadline}</span></div>
    </div>
    <div class="goal-footer">
      <select class="status-select" data-goal="${g.goalID}" data-history="1">
        <option value="進行中">進行中</option>
        <option value="已完成" ${g.status === '已完成' ? 'selected' : ''}>已完成</option>
        <option value="已放棄" ${g.status === '已放棄' ? 'selected' : ''}>已放棄</option>
      </select>
    </div>
  `;

  return `
  <div class="goal-card ${catClass}${overdueClass}" id="card-${g.goalID}">
    <div class="goal-top">
      <span class="goal-id-badge">${g.goalID}</span>
    </div>
    <div class="goal-name">${escapeHtml(g.goalName)}</div>
    ${(isActive && g.isOverdue) ? `<div class="overdue-flag">${THEME.overdueIcon} 已逾期，請調整計畫</div>` : ''}
    <div class="progress-track"><div class="progress-fill" id="bar-${g.goalID}"></div></div>
    <div class="progress-text"><span>已投入 ${fmtHours(g.accumulatedHours)}h</span><span class="pct">${pct}%</span></div>
    ${metaBody}
  </div>`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

function bindActiveCardEvents() {
  // 行內編輯
  document.querySelectorAll('#yearGoalGrid .editable').forEach(span => {
    span.addEventListener('click', () => {
      requireUnlock(() => startInlineEdit(span));
    });
  });
  // 狀態切換
  document.querySelectorAll('#yearGoalGrid .status-select').forEach(sel => {
    sel.addEventListener('change', () => {
      const goalID = sel.dataset.goal;
      const newStatus = sel.value;
      requireUnlock(async () => {
        try {
          await apiPost('updateGoalStatus', { goalID, newStatus });
          showToast('狀態已更新為「' + newStatus + '」', 'success');
          await loadGoalsData();
          renderYearGoals();
        } catch (e) {
          showToast(e.message, 'error');
        }
      });
    });
  });
}

function startInlineEdit(span) {
  const field = span.dataset.field;
  const goalID = span.dataset.goal;
  const current = span.dataset.current;
  const input = document.createElement('input');
  input.value = current;
  input.type = field === 'Deadline' ? 'date' : 'number';
  if (field !== 'Deadline') { input.step = '0.5'; input.min = '0'; }
  span.replaceWith(input);
  input.focus();
  input.select();

  const commit = async () => {
    const newValue = input.value;
    try {
      await apiPost('updateGoal', { goalID, field, newValue });
      showToast('已更新', 'success');
      await loadGoalsData();
      renderYearGoals();
    } catch (e) {
      showToast(e.message, 'error');
      renderYearGoals();
    }
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') input.blur(); });
}

/* =========================================================
   新增目標 Modal
   ========================================================= */
const addGoalModalOverlay = document.getElementById('addGoalModalOverlay');

document.getElementById('btnOpenAddGoal').addEventListener('click', () => {
  requireUnlock(openAddGoalModal);
});

function openAddGoalModal() {
  const sel = document.getElementById('newGoalCategory');
  sel.innerHTML = state.categories.map(c => `<option value="${c.code}">${c.code}　${c.name}</option>`).join('');
  document.getElementById('newGoalName').value = '';
  document.getElementById('newGoalHours').value = '';
  document.getElementById('newGoalStart').value = todayISO();
  document.getElementById('newGoalDeadline').value = '';
  document.getElementById('newGoalNote').value = '';
  document.getElementById('addGoalError').style.display = 'none';
  addGoalModalOverlay.classList.add('show');
}
document.getElementById('btnCancelAddGoal').addEventListener('click', () => addGoalModalOverlay.classList.remove('show'));

document.getElementById('btnSubmitAddGoal').addEventListener('click', async () => {
  const categoryCode = document.getElementById('newGoalCategory').value;
  const goalName = document.getElementById('newGoalName').value.trim();
  const estimatedHours = document.getElementById('newGoalHours').value;
  const startDate = document.getElementById('newGoalStart').value;
  const deadline = document.getElementById('newGoalDeadline').value;
  const note = document.getElementById('newGoalNote').value.trim();
  const errEl = document.getElementById('addGoalError');

  if (!goalName || !estimatedHours || !startDate || !deadline) {
    errEl.textContent = '請確認欄位都已填寫';
    errEl.style.display = 'block';
    return;
  }
  if (new Date(deadline) < new Date(startDate)) {
    errEl.textContent = '截止日不能早於開始日';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('btnSubmitAddGoal');
  btn.disabled = true;
  try {
    await apiPost('addGoal', { categoryCode, goalName, estimatedHours, startDate, deadline, note });
    addGoalModalOverlay.classList.remove('show');
    showToast('目標新增成功', 'success');
    await loadGoalsData();
    renderYearGoals();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
  }
});

/* =========================================================
   週計畫頁
   ========================================================= */
function getCurrentWeekWeekdays() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  const mondayOffset = day === 0 ? -6 : 1 - day;
  const monday = new Date(now);
  monday.setDate(now.getDate() + mondayOffset);
  monday.setHours(0,0,0,0);
  const days = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push(d);
  }
  return days;
}

function isoDate(d) {
  const tz = d.getTimezoneOffset() * 60000;
  return new Date(d - tz).toISOString().slice(0, 10);
}

const WEEKDAY_LABEL = ['日','一','二','三','四','五','六'];

async function renderWeekPage() {
  const days = getCurrentWeekWeekdays();
  document.getElementById('weekRangeLabel').textContent =
    `${isoDate(days[0])} ~ ${isoDate(days[4])}`;

  const table = document.getElementById('weekTable');
  if (!state.activeGoals.length) {
    table.innerHTML = `<tr><td style="padding:40px;text-align:center;color:var(--text-secondary)">目前沒有進行中的目標</td></tr>`;
    return;
  }

  let thead = '<tr><th style="text-align:left">目標</th>' +
    days.map(d => `<th>週${WEEKDAY_LABEL[d.getDay()]}<br><span style="font-weight:400">${isoDate(d).slice(5)}</span></th>`).join('') +
    '</tr>';

  let rows = state.activeGoals.map(g => {
    const catGroup = categoryGroup(g.categoryCode);
    const catClass = CAT_COLOR_CLASS[catGroup] || 'cat-A';
    const dailyVal = g.isOverdue ? '—' : fmtHours(g.suggestedDailyHours) + 'h';
    return `<tr class="week-row ${catClass}">
      <td class="goal-label">${g.goalID}　${escapeHtml(g.goalName)}</td>
      ${days.map(() => `<td class="num-cell">${dailyVal}</td>`).join('')}
    </tr>`;
  }).join('');

  const totalPerDay = state.activeGoals.reduce((sum, g) => sum + (g.isOverdue ? 0 : g.suggestedDailyHours), 0);
  let totalRow = `<tr class="total-row"><td style="text-align:left">每日加總</td>${days.map(() => `<td>${fmtHours(totalPerDay)}h</td>`).join('')}</tr>`;

  table.innerHTML = thead + rows + totalRow;
}

/* =========================================================
   日計畫頁
   ========================================================= */
async function renderDayPage() {
  const today = todayISO();
  const d = new Date();
  document.getElementById('dayDateStr').textContent =
    `今天 ${today}（週${WEEKDAY_LABEL[d.getDay()]}）`;

  try {
    state.todayLogs = await apiGet('getDailyLog', { startDate: today, endDate: today });
  } catch (e) {
    showToast('讀取今日紀錄失敗：' + e.message, 'error');
    state.todayLogs = {};
  }

  const todaysEntries = state.todayLogs[today] || [];
  const logMap = {};
  todaysEntries.forEach(e => { logMap[e.goalID] = e.totalActualHours; });

  const list = document.getElementById('dayList');
  const goals = state.activeGoals;

  if (!goals.length) {
    list.innerHTML = `<div class="empty-state"><div class="big">${THEME.celebrateIcon}</div>目前沒有進行中的目標</div>`;
    document.getElementById('dayTotalStr').textContent = '今日建議投入 0 h';
    return;
  }

  const totalSuggested = goals.reduce((sum, g) => sum + (g.isOverdue ? 0 : g.suggestedDailyHours), 0);
  document.getElementById('dayTotalStr').textContent = `今日建議投入 ${fmtHours(totalSuggested)} h`;

  list.innerHTML = goals.map(g => {
    const catGroup = categoryGroup(g.categoryCode);
    const catClass = CAT_COLOR_CLASS[catGroup] || 'cat-A';
    const loggedToday = logMap[g.goalID] || 0;
    const doneClass = loggedToday > 0 ? ' done' : '';
    return `
    <div class="day-card ${catClass}${doneClass}" id="day-card-${g.goalID}">
      <div class="day-card-main">
        <div class="day-goal-name">${g.goalID}　${escapeHtml(g.goalName)}</div>
        <div class="day-goal-sub">
          建議 <span class="num">${g.isOverdue ? '—' : fmtHours(g.suggestedDailyHours) + 'h'}</span>
          ${loggedToday > 0 ? `　今日已記錄 <span class="num">${fmtHours(loggedToday)}h</span>` : ''}
        </div>
      </div>
      <div class="day-card-actions">
        <button class="check-btn" data-goal="${g.goalID}">${THEME.checkIcon} 打勾完成</button>
        <div class="manual-input-group">
          <input type="number" step="0.25" min="0" placeholder="時數" id="manual-${g.goalID}">
          <button data-goal="${g.goalID}" class="manual-submit">送出</button>
        </div>
      </div>
    </div>`;
  }).join('');

  bindDayCardEvents();
}

function bindDayCardEvents() {
  document.querySelectorAll('.check-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const goalID = btn.dataset.goal;
      requireUnlock(() => logDaily(goalID, 'check', null));
    });
  });
  document.querySelectorAll('.manual-submit').forEach(btn => {
    btn.addEventListener('click', () => {
      const goalID = btn.dataset.goal;
      const input = document.getElementById('manual-' + goalID);
      const val = parseFloat(input.value);
      if (!val || val <= 0) { showToast('請輸入大於 0 的時數', 'error'); return; }
      requireUnlock(() => logDaily(goalID, 'manual', val));
    });
  });
}

async function logDaily(goalID, mode, actualHours) {
  try {
    const today = todayISO();
    await apiPost('addDailyLog', { goalID, date: today, mode, actualHours });
    showToast('已記錄', 'success');
    const card = document.getElementById('day-card-' + goalID);
    if (card) { card.classList.add('just-logged'); setTimeout(() => card.classList.remove('just-logged'), 450); }
    await loadGoalsData();
    await renderDayPage();
    renderYearBanner();
  } catch (e) {
    showToast(e.message, 'error');
  }
}

/* =========================================================
   資料載入
   ========================================================= */
async function loadGoalsData() {
  const [active, history] = await Promise.all([
    apiGet('getActiveGoals'),
    apiGet('getGoalHistory')
  ]);
  state.activeGoals = active;
  state.historyGoals = history;
  renderYearBanner();
}

function renderYearBanner() {
  const total = state.activeGoals.reduce((sum, g) => sum + (g.isOverdue ? 0 : g.suggestedDailyHours), 0);
  document.getElementById('yearTodayTotal').textContent = fmtHours(total) + ' h';
}

async function init() {
  try {
    state.categories = await apiGet('getCategories');
    await loadGoalsData();
    renderYearGoals();
  } catch (e) {
    showToast('初始化失敗：' + e.message, 'error');
  }
}

updateLockUI();
init();
</script>
</body>
</html>
