<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人計畫系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ... (保留原本的主題 CSS) ... */
    </style>
</head>
<body class="p-8">
    <!-- 加入錯誤顯示容器 -->
    <div id="error-log" class="bg-red-100 text-red-700 p-4 mb-4 hidden rounded"></div>

    <header class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">個人計畫系統</h1>
        <div id="month-display" class="text-gray-600"></div>
    </header>

    <main id="main-content">
        <!-- 內容區域 -->
        <div id="data-display" class="mt-4 text-gray-500">系統連接中...</div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyRvotFP-aHE7ei3jeQBwMYw4PEuyFBZg7hWcuCrdEqzLCBySiTwEW0k-TuT8KNsnKDfg/exec";

        async function fetchData(action) {
            const errDiv = document.getElementById('error-log');
            try {
                const response = await fetch(`${API_URL}?action=${action}`);
                if (!response.ok) throw new Error(`HTTP 狀態錯誤: ${response.status}`);
                return await response.json();
            } catch (e) {
                console.error("Fetch error:", e);
                errDiv.classList.remove('hidden');
                errDiv.innerText = `無法載入資料 (${action}): ${e.message}。請確認 GAS 是否已發布且權限設為「所有人」。`;
                return null;
            }
        }

        async function init() {
            const data = await fetchData('getTasks');
            if (data) {
                document.getElementById('data-display').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
