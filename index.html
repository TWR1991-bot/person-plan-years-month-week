<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人計畫系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #f4f4f4;
            --text-color: #333;
        }
        /* Fitness Style (單數月) */
        .fitness-theme { background-color: #fdf2f2; --primary-color: #f97316; }
        /* Beach Style (雙數月) */
        .beach-theme { background-color: #f0f9ff; --primary-color: #0284c7; }
        
        body { font-family: sans-serif; transition: all 0.5s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="p-8">

    <header class="mb-8">
        <h1 class="text-3xl font-bold">個人計畫系統</h1>
        <div id="status-log" class="text-sm text-gray-500">系統初始化中...</div>
    </header>

    <div id="content-area">
        <h2 class="text-xl font-bold mb-4">週計畫內容</h2>
        <div id="weekly-data" class="bg-white p-4 rounded shadow">載入中...</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyRvotFP-aHE7ei3jeQBwMYw4PEuyFBZg7hWcuCrdEqzLCBySiTwEW0k-TuT8KNsnKDfg/exec";
        
        function applyTheme() {
            const month = new Date().getMonth() + 1;
            console.log("當前月份:", month);
            if (month % 2 === 0) {
                document.body.className = 'beach-theme p-8';
            } else {
                document.body.className = 'fitness-theme p-8';
            }
        }

        async function init() {
            applyTheme();
            const log = document.getElementById('status-log');
            try {
                // 使用簡單 fetch，GAS 已設定 CORS Header
                const response = await fetch(`${API_URL}?action=getTasks`, { method: 'GET' });
                const result = await response.json();
                document.getElementById('weekly-data').innerText = JSON.stringify(result, null, 2);
                log.innerText = "連線成功！";
            } catch (e) {
                log.innerText = "連線錯誤: " + e.message;
                console.error(e);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
